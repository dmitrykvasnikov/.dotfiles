[colors]
bg = #27374d
fg = #dde6ed
i = #91c8e4
i-cpu = #4682a9
i-mem = #4682a9
i-vlm = #fffad7
i-brt = #fffad7
i-clk = #d3d04f
i-kbd = #d3d04f
bg-ws = #526d82
bg-ws-alt = #9db2b8
fg-alert = #e84545
fg-disabled = #707880
fg-title = #dde6ed
fg-btfull = #57c5b6

[bar/bar]
width = 100%
radius = 3
height = 20pt

#!! Setup dpi in custom.config.ini

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 5px
separator = " "

#!! Setup fonts in custom.config.ini
font-0 = "Fira Code:size=12:style=regular;2"
font-1 = "Fira Code:size=12:style=regular;3"
font-2 = "Symbols Nerd FoNt Mono:size=12;2"
font-3 = "Symbols Nerd Font Mono:size=12;3"

modules-left = xworkspaces i3
modules-right = cpu memory pulseaudio backlight battery wlan xkeyboard date
modules-center = xwindow
fixed-center = true

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

include-file = /home/dmitry/.config/polybar/custom.config.ini

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.fg}
label-active-background = ${colors.bg-ws}
label-active-underline= ${colors.fg-btfull}
label-active-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.bg-ws}
label-occupied-background = ${colors.bg-ws-alt}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.fg-alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.fg-disabled}
label-empty-backgrround = ${colors.bg-ws-alt}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.fg-title}
label-font = 2

[module/battery]
type = internal/battery
full-at = 100
low-at = 10
battery = BAT0
format-charging-font = 3
format-discharging-font = 3
format-charging-prefix = "ůįāĄ "
format-charging-foreground = ${colors.fg-btfull}
format-discharging-prefix = "ůįĀŅ "
format-discharging-prefix-foreground = ${colors.i}
label = %percentage:3%%
label-full = ůįĀĻ%percentage:3%%
label-full-foreground = ${colors.fg-btfull}
label-low = ůįāÉ%percentage:3%%
label-low-foreground = ${colors.fg-alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ÔÄ®"
format-volume-prefix-foreground = ${colors.i-vlm}
format-volume-prefix-font = 3
format-volume = <label-volume>
label-volume = %percentage:3%%
format-muted-prefix = "ůįĖĀ"
format-muted-prefix-foreground = ${colors.fg-disabled}
format-muted-prefix-font = 3
format-muted = <label-muted>
label-muted = %percentage:3%%
label-muted-foreground = ${colors.fg-disabled}

[module/backlight]
type = internal/backlight
#!! Setup card in custom.config.ini
use-actual-brightness = true
format-prefix = "ůįćĻ"
format-prefix-foreground = ${colors.i-brt}
label = %percentage:3%%

[module/xkeyboard]
format-prefix = "ÔĄú "
format-prefix-foreground = ${colors.i-kbd}
format-prefix-font = 4
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = caps lock
label-layout = %icon%
layout-icon-0 = us;US
layout-icon-1 = ru;RU
label-layout-foreground = ${colors.fg}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.bg}
label-indicator-background = ${colors.i}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = "ůįĖ™"
label-disconnected-foreground = ${colors.fg-alert}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = "Ôáę"
label-connected-foreground = ${colors.i}

[module/date]
format-prefix = "ÔÄó "
format-prefix-foreground = ${colors.i-clk}
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.fg}
format-padding = 5px

[module/i3]
type = internal/i3
format = <lable-state> <label-mode>
format-foreground = ${colors.i}

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
label = %percentage:3%%
format-prefix = "Ôíľ"
format-prefix-foreground = ${colors.i-cpu}

[module/memory]
type = internal/memory
interval = 1
format = <label>
label = %percentage_used:3%%
format-prefix = "Ôčõ"
format-prefix-foreground = ${colors.i-mem}


[settings]
screenchange-reload = true
pseudo-transparency = true

